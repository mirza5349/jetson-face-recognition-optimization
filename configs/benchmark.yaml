# configs/benchmark.yaml
# Parameter matrix for FaceNet benchmarking suite

resolutions:
  - [640, 480]
  - [1280, 720]
  - [1920, 1080]

batch_sizes:
  - 1
  - 4
  - 8
  - 16

face_counts:
  - 1
  - 3
  - 5
  - 10

pose_angles:
  - 0    # Frontal (0 to 15 degrees)
  - 30   # Mild Oblique (15 to 30 / 30 to 40 degrees)
  - 50   # Hard Oblique (40 to 50 degrees)

lighting_conditions:
  - "normal"
  - "low_light"
  - "side_lighting"
  - "strong_shadow"

database_sizes:
  - 10
  - 100
  - 1000
  - 10000

# Timing settings
iterations: 100
warmup_iterations: 10
similarity_threshold: 0.6  # Default L2 threshold (euclidean) or 0.8 (cosine similarity)
